# =============================================================================
# Squid TLS-intercepting forward proxy configuration
# =============================================================================

# --- Network ---
http_port 3128 ssl-bump \
    cert=/etc/squid/certs/ca-combined.pem \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

# --- SSL Bump ---
# Peek at the TLS ClientHello to get the SNI, then bump (intercept) all connections.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# TLS outgoing options
sslproxy_cert_error allow all
sslproxy_flags DONT_VERIFY_PEER

# --- ACLs ---
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access allow localhost
http_access deny all

# --- ICAP Integration (Go translator service) ---
icap_enable on
icap_service translator_svc respmod_precache bypass=on icap://translator:1344/translate
adaptation_service_chain translator_chain translator_svc
adaptation_access translator_chain allow all

# Send the full response body to the ICAP service
icap_send_client_ip on
icap_send_client_username on

# --- Logging ---
access_log daemon:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Logging levels (reduce for production)
debug_options ALL,1 93,3

# --- Cache ---
# Disable caching to ensure ICAP always processes responses
cache deny all

# --- Misc ---
visible_hostname translate-proxy
coredump_dir /var/spool/squid

# Cert cache for dynamically generated certs
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB
sslcrtd_children 5
